services:
  db:
    image: timescale/timescaledb:latest-pg16
    restart: unless-stopped
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - .env
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # ports removed: containers connect via internal network, avoids host port conflicts

  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "8001:8001"
    depends_on:
      - db
      - redis
    env_file:
      - .env
    security_opt:
      - seccomp:unconfined
    volumes:
      - ./backend:/app

  celery-worker-crawl:
    build: ./backend
    restart: unless-stopped
    command: celery -A app.celery_app worker --concurrency=4 -Q crawl --loglevel=info -n crawl@%h
    depends_on:
      - db
      - redis
    env_file:
      - .env
    security_opt:
      - seccomp:unconfined
    environment:
      - SCRAPY_PROJECT_DIR=/scrapy_project
      - DATABASE_URL_SYNC=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    volumes:
      - ./backend:/app
      - ./stock_tracer:/scrapy_project/stock_tracer
      - ./scrapy.cfg:/scrapy_project/scrapy.cfg

  celery-worker-backtest:
    build: ./backend
    restart: unless-stopped
    command: celery -A app.celery_app worker --concurrency=2 -Q backtest --loglevel=info -n backtest@%h
    depends_on:
      - db
      - redis
    env_file:
      - .env
    volumes:
      - ./backend:/app

  celery-beat:
    build: ./backend
    restart: unless-stopped
    command: celery -A app.celery_app beat --loglevel=info
    depends_on:
      - db
      - redis
    env_file:
      - .env
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      args:
        - API_BACKEND_URL=http://backend:8001
    restart: unless-stopped
    # port accessed via nginx, not exposed to host to avoid conflicts
    depends_on:
      - backend
    env_file:
      - .env

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8580:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:
